global:
  scrape_interval: 5s # Scrape targets every 5 seconds for real-time fidelity
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'metrics-consumer'
    static_configs:
      - targets: ['metrics-consumer:3001']
